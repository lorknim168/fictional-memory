<section class="page-banner">

<div>

<h1>Reserve Your Table</h1>

<p>Book your perfect coffee experience.</p>

</div>

</section>

<section class="reservation-container">

<div class="reservation-image">

<img src="https://images.unsplash.com/photo-1554118811-1e0d58224f24?auto=format&fit=crop&w=1200&q=80">

</div>

<div class="reservation-form">

<h2>Book a Table</h2>

<form id="reservationForm">
    <input
type="text"
placeholder="Full Name"
required>

<input
type="email"
placeholder="Email Address"
required>

<input
type="tel"
placeholder="Phone Number"
required>

<input
type="date"
required>

<input
type="time"
required>

<select required>

<option value="">Number of Guests</option>

<option>1 Person</option>

<option>2 People</option>

<option>3 People</option>

<option>4 People</option>

<option>5 People</option>

<option>6+ People</option>

</select>

<select required>

<option value="">Choose Table</option>

<option>Window Seat</option>

<option>Indoor Table</option>

<option>Outdoor Table</option>

<option>VIP Area</option>

</select>

<textarea

rows="5"

placeholder="Special Requests (Optional)">

</textarea>

<button class="btn reservation-btn">

Reserve Now

</button>

</form>

</div>

</section>
<section class="reservation-info">

<div class="info-card">

<i class="fa-solid fa-clock"></i>

<h3>Opening Hours</h3>

<p>

Monday - Friday

<br>

8:00 AM - 9:00 PM

</p>

</div>

<div class="info-card">

<i class="fa-solid fa-phone"></i>

+855 12 345 678

</p>

</div>

<div class="info-card">

<i class="fa-solid fa-location-dot"></i>

<h3>Location</h3>

<p>

Phnom Penh, Cambodia

</p>

</div>

</section>
